name: CCAuditor CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]

  pull_request:

  schedule:
    - cron: "0 4 * * 1"

  workflow_dispatch:


jobs:

  python_matrix_tests:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        dependency-set: ["locked", "latest"]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Test Dependencies
        run: |
          pip install pytest

      - name: Run Tests
        run: |
          pytest -q

  lint_and_security:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black pip-audit pip-tools

      - name: Lint Code
        run: |
          ruff check .

      - name: Format Check
        run: |
          black --check .

      - name: Security Scan
        run: |
          pip-audit


  compile_dependencies:

    runs-on: ubuntu-latest
    needs: lint_and_security

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: |
          pip install pip-tools

      - name: Compile requirements
        run: |
          pip-compile requirements.in --output-file=requirements.txt

      - name: Commit dependency updates
        run: |
          if git diff --quiet requirements.txt; then
            echo "No dependency updates"
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add requirements.txt
            git commit -m "chore: update requirements.txt via pip-compile"
            git push
          fi


  canvas_integration_tests:

    runs-on: ubuntu-latest
    needs: lint_and_security

    env:
      CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
      CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Canvas Integration Tests
        run: |
          python tests/test_canvas_connection.py


  docker_build:

    runs-on: ubuntu-latest
    needs: [lint_and_security, canvas_integration_tests, python_matrix_tests]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ccauditor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max


  container_security_scan:

    runs-on: ubuntu-latest
    needs: docker_build

    steps:

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ccauditor:ci
          severity: CRITICAL,HIGH
          exit-code: 1


  docker_publish:

    runs-on: ubuntu-latest
    needs: container_security_scan
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  release:

    runs-on: ubuntu-latest
    needs: docker_publish
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Release Tag
        id: tag
        run: |
          VERSION="v$(date +'%Y.%m.%d.%H%M')"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true