name: CCAuditor CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
    paths:
      - "requirements.in"
  pull_request:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:

# -------------------------
# COMPILE DEPENDENCIES
# -------------------------

  compile_requirements:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile requirements.txt using Docker
        run: |
          docker run --rm \
            -v "$PWD":/app \
            -w /app \
            python:3.12-slim \
            bash -c "pip install pip-tools && pip-compile requirements.in --output-file=requirements.txt"

      - name: Check for dependency changes
        run: |
          if git diff --quiet requirements.txt; then
            echo "No dependency updates needed."
          else
            echo "requirements.txt updated."
          fi

      - name: Commit updated requirements.txt
        if: success()
        run: |
          if git diff --quiet requirements.txt; then
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add requirements.txt
          git commit -m "chore: update requirements.txt via pip-compile"
          git push


# -------------------------
# LINT + SECURITY
# -------------------------
  lint_and_security:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort pip-audit

      - name: Ruff Lint
        run: ruff check .

      - name: Black Format Check
        run: black --check .

      - name: Import Sort Check
        run: isort --check .

      - name: Dependency Security Scan
        run: pip-audit


# -------------------------
# PYTHON MATRIX TESTS
# -------------------------
  python_matrix_tests:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q


# -------------------------
# CANVAS INTEGRATION TESTS
# -------------------------
  canvas_integration_tests:

    runs-on: ubuntu-latest
    needs: lint_and_security

    if: ${{ secrets.CANVAS_API_TOKEN != '' }}

    env:
      CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
      CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Canvas integration tests
        run: pytest tests/test_canvas_connection.py


# -------------------------
# DOCKER BUILD
# -------------------------
  docker_build:

    runs-on: ubuntu-latest
    needs: [lint_and_security, python_matrix_tests]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build App Image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: ccauditor:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker Image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          tags: ccauditor-worker:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max


# -------------------------
# CONTAINER SECURITY SCAN
# -------------------------
  container_security_scan:

    runs-on: ubuntu-latest
    needs: docker_build

    steps:

      - name: Scan App Image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ccauditor:ci
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan Worker Image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ccauditor-worker:ci
          severity: CRITICAL,HIGH
          exit-code: 1


# -------------------------
# DOCKER IMAGE PUBLISH
# -------------------------
  docker_publish:

    runs-on: ubuntu-latest
    needs: container_security_scan
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish App Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish Worker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


# -------------------------
# AUTOMATED RELEASE
# -------------------------

  release:

    runs-on: ubuntu-latest
    needs: docker_publish
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Release Tag
        id: tag
        run: |
          VERSION="v$(date +'%Y.%m.%d.%H%M')"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true

# -------------------------
# VERIFY WCAG RULES
# -------------------------

  verify_rules:

    runs-on: ubuntu-latest
    needs: [lint_and_security]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify scanner rule mappings
        run: |
          PYTHONPATH=. python scripts/verify_rule_mapping.py