version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ccauditor_app
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    ports:
      - "49152:8501"
    expose:
      - "8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: ccauditor_worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "python scripts/wait_for_dependencies.py &&
               celery -A app.celery_app worker --loglevel=info"
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: ccauditor_scheduler
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "python scripts/wait_for_dependencies.py &&
               celery -A app.celery_app beat --loglevel=info"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ccauditor_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ccauditor_postgres
    environment:
      POSTGRES_USER: ccauditor
      POSTGRES_PASSWORD: ccauditor
      POSTGRES_DB: ccauditor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccauditor"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: