# -------------------------------------------------------------------
# Reusable anchors
# -------------------------------------------------------------------

x-worker-build: &worker-build
  context: .
  dockerfile: docker/worker.Dockerfile

x-worker-env: &worker-env
  REDIS_URL: ${REDIS_URL}
  DATABASE_URL: ${DATABASE_URL}
  CANVAS_BASE_URL: ${CANVAS_BASE_URL}
  CANVAS_API_TOKEN: ${CANVAS_API_TOKEN}

x-worker-healthcheck: &worker-healthcheck
  test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping"]
  interval: 60s
  timeout: 10s
  retries: 5
  start_period: 30s

x-logging-default: &logging-default
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# -------------------------------------------------------------------
# Services
# -------------------------------------------------------------------

services:

  app:
    container_name: streamlit_app
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: /app/scripts/start_app.sh
    ports:
      - "8501"
      - "8000"
    environment:
      <<: *worker-env
    env_file:
      - .env
    logging: *logging-default
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    cpus: 1
    mem_limit: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery_scans:
    container_name: ccauditor_worker_scans
    build: *worker-build
    command: /app/scripts/start_worker.sh -Q scans --concurrency=4
    env_file:
      - .env
    environment:
      <<: *worker-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging-default
    cpus: 2
    mem_limit: 2G
    healthcheck: *worker-healthcheck


  celery_ai:
    container_name: ccauditor_worker_ai
    build: *worker-build
    command: /app/scripts/start_worker.sh -Q ai --concurrency=4
    env_file:
      - .env
    environment:
      <<: *worker-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging-default
    cpus: 2
    mem_limit: 2G
    healthcheck: *worker-healthcheck


  celery_hygiene:
    container_name: ccauditor_worker_hygiene
    build: *worker-build
    command: /app/scripts/start_worker.sh -Q hygiene --concurrency=2
    env_file:
      - .env
    environment:
      <<: *worker-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging-default
    cpus: 1
    mem_limit: 1G
    healthcheck: *worker-healthcheck

  celery_scheduler:
    container_name: ccauditor_scheduler
    build: *worker-build
    command: /app/scripts/start_scheduler.sh
    env_file:
      - .env
    environment:
      <<: *worker-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging-default
    cpus: 0.5
    mem_limit: 512M
    healthcheck: *worker-healthcheck

  redis:
    container_name: ccauditor_redis
    image: redis:7-alpine
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512M
    volumes:
      - redis_data:/data
    logging: *logging-default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  postgres:
    container_name: ccauditor_postgres
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    cpus: 2
    mem_limit: 2G
    env_file:
      - .env
    environment:
      POSTGRES_USER: ccauditor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ccauditor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c effective_cache_size=1GB
      -c max_connections=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c synchronous_commit=off
      
    logging: *logging-default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccauditor"]
      interval: 5s
      timeout: 5s
      retries: 10

  prometheus:
    container_name: ccauditor_prometheus
    image: prom/prometheus
    ports:
      - "9090"
    volumes:
      - ./prometheus:/etc/prometheus
    restart: unless-stopped
    logging: *logging-default
    cpus: 0.5
    mem_limit: 1G

  grafana:
    container_name: ccauditor_grafana
    image: grafana/grafana
    ports:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    logging: *logging-default
    cpus: 0.5
    mem_limit: 512M

# -------------------------------------------------------------------
# Volumes
# -------------------------------------------------------------------

volumes:
  postgres_data:
  redis_data:
  grafana_data: